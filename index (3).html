<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>钱老八的私密照片</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff47;
      --text: #eee;
      --muted: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
    }

    /* TOP NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 4px;
      color: var(--accent);
    }
    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
      font-size: 13px;
      color: var(--muted);
    }
    .nav-links li { cursor: pointer; transition: color .2s; }
    .nav-links li:hover, .nav-links li.active { color: var(--text); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    /* HERO */
    .hero {
      padding: 48px 32px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp .6s ease both;
    }
    .hero-tag {
      background: var(--accent);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 1px;
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      color: var(--text);
    }

    /* FILTER BAR */
    .filter-bar {
      padding: 16px 32px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      animation: fadeUp .6s .1s ease both;
    }
    .tag {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }
    .tag:hover, .tag.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* GRID */
    .grid-container {
      padding: 24px 32px 48px;
      animation: fadeUp .6s .2s ease both;
    }
    .grid-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    /* CARD */
    .card {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s ease, filter .4s ease;
      filter: brightness(.9);
    }
    .card:hover img {
      transform: scale(1.05);
      filter: brightness(1);
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 50%);
      opacity: 0;
      transition: opacity .3s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-meta {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 400;
      color: #fff;
    }
    .card-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity .3s;
    }
    .card:hover .card-actions { opacity: 1; }
    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s;
      color: #fff;
      font-size: 14px;
    }
    .action-btn:hover { background: rgba(232,255,71,.2); }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 80px rgba(0,0,0,.8);
      animation: zoomIn .25s ease;
    }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 28px;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s;
      line-height: 1;
    }
    .lightbox-close:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      .hero { padding: 32px 16px 24px; }
      .filter-bar { padding: 12px 16px; }
      .grid-container { padding: 16px 16px 48px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .nav-links { display: none; }
    }
  </style>
</head>

<script>
  function openLightbox() {
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });

  document.querySelectorAll('.tag').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tag').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    });
  });
</script>
